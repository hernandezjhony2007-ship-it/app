<h1>git hub pages app</h1>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Instagram Login - App Beta</title>
</head>
<body>

    <!-- Estructura RAW para el segundo commit del repositorio app-beta -->
    <div>
        <!-- Logo de Instagram -->
        <h1>Instagram</h1>

        <form>
            <!-- Campos de entrada basados en el wireframe -->
            <div>
                <input type="text" placeholder="Teléfono, usuario o correo electrónico">
            </div>

            <div>
                <input type="password" placeholder="Contraseña">
            </div>

            <!-- Botón de acción principal -->
            <button type="submit">Entrar</button>

            <div>
                <p>O</p>
                <button type="button">Iniciar sesión con Facebook</button>
            </div>

            <p>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </p>
        </form>

        <!-- Sección de registro sugerida en el flujo -->
        <section>
            <p>¿No tienes una cuenta? <a href="#">Regístrate</a></p>
        </section>

        <footer>
            <p>Descarga la aplicación.</p>
        </footer>
    </div>

</body>
</html>
